name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.

        Please include enough detail so someone can reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps to reproduce.
      placeholder: |
        1. Go to...
        2. Run...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste error output or add screenshots.
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend (FastAPI / Python)
        - Frontend (React / TypeScript)
        - CI / Tooling
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, Python version, etc.
      placeholder: "macOS 15, Node 20, Python 3.12"
