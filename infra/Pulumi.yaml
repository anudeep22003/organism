name: storyengine-infra
description: A story generator for one and for all
runtime:
  name: python
  options:
    toolchain: uv
config:
  pulumi:tags:
    value:
      pulumi:template: python
  # App name — used as the prefix for all GCP resource names.
  # Override in Pulumi.<stack>.yaml for a new project.
  # If you change this, also update:
  #   1. name: in this file (Pulumi project name — drives config key namespace)
  #   2. APP := in Makefile (reads storyengine-infra:app — key prefix must match project name)
  storyengine-infra:app: storyengine
  # Short random suffix appended to the GCS media bucket name for global uniqueness.
  # MUST be set in Pulumi.<stack>.yaml before first deploy.
  # Generate one with: openssl rand -hex 2   (gives 4 hex chars, e.g. "a3f1")
  # IMMUTABLE after first deploy — changing it recreates the bucket and loses all media.
  storyengine-infra:media_bucket_suffix: ""
  # GitHub repo that may authenticate via Workload Identity Federation.
  # SECURITY: only tokens from this repo can impersonate github-actions-sa.
  # Set in Pulumi.<stack>.yaml. Format: "owner/repo"  e.g. "acme/myapp"
  storyengine-infra:github_repo: ""
  # Google OAuth client ID for the backend auth flow.
  # Plain config, not a secret. Set in Pulumi.<stack>.yaml.
  storyengine-infra:google_oauth_client_id: ""
